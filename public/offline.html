<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#00f0ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>NeonDelivery - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      text-align: center;
      padding: 20px;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(40px, 40px); }
    }

    .container {
      max-width: 380px;
      position: relative;
      z-index: 1;
    }

    .logo-wrapper {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      position: relative;
    }

    .logo-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(0, 240, 255, 0.3);
      animation: ringPulse 2s ease-in-out infinite;
    }

    .logo-ring:nth-child(2) {
      inset: -8px;
      border-color: rgba(139, 92, 246, 0.2);
      animation-delay: 0.5s;
    }

    .logo-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, #1a1a2e, #0d0d1a);
      border: 2px solid rgba(0, 240, 255, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(0, 240, 255, 0.15), inset 0 0 30px rgba(0, 240, 255, 0.05);
    }

    .bolt {
      font-size: 48px;
      filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.6));
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00f0ff, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border-radius: 50px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      margin-bottom: 28px;
      font-size: 12px;
      font-weight: 600;
      color: #ef4444;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #00f0ff, #8b5cf6);
      color: #000;
      border: none;
      padding: 14px 40px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 240, 255, 0.3);
    }

    .retry-btn:active {
      transform: scale(0.96);
    }

    .features {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 10px;
      color: #4b5563;
    }

    .feature {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .feature-icon {
      font-size: 20px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrapper">
      <div class="logo-ring"></div>
      <div class="logo-ring"></div>
      <div class="logo-inner">
        <div class="bolt">&#9889;</div>
      </div>
    </div>

    <h1>NeonDelivery</h1>

    <div class="status-badge">
      <div class="status-dot"></div>
      Sem Conexao
    </div>

    <p class="subtitle">
      Voce esta offline no momento.<br>
      Verifique sua conexao com a internet e tente novamente.
    </p>

    <button class="retry-btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
        <path d="M16 16h5v5"/>
      </svg>
      Reconectar
    </button>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">&#128230;</span>
        Cache Ativo
      </div>
      <div class="feature">
        <span class="feature-icon">&#128276;</span>
        Notificacoes OK
      </div>
      <div class="feature">
        <span class="feature-icon">&#128241;</span>
        App Instalado
      </div>
    </div>
  </div>

  <script>
    // Auto-retry every 10 seconds
    let retryCount = 0;
    const maxRetries = 30;
    const retryInterval = setInterval(async () => {
      retryCount++;
      if (retryCount > maxRetries) {
        clearInterval(retryInterval);
        return;
      }
      try {
        const res = await fetch('/', { method: 'HEAD', cache: 'no-store' });
        if (res.ok) {
          clearInterval(retryInterval);
          window.location.reload();
        }
      } catch (e) {}
    }, 10000);
  </script>
</body>
</html>
